<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.L.M. College - Secure Master Portal v23.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --primary: #004d40; --accent: #ffd600; --danger: #c62828; --success: #2e7d32; --blue: #1976d2; --purple: #6a1b9a; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 25px; cursor: pointer; border: 2px solid var(--primary); background: white; border-radius: 50px; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .section { display: none; }
        input, select, button { padding: 12px; margin: 8px 0; width: 100%; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; }
        .btn-search { background: var(--primary); color: white; border: none; cursor: pointer; }
        .btn-scan { background: #ff5722; color: white; border: none; font-weight: bold; }
        .btn-issue { background: var(--success); color: white; border: none; font-size: 18px; cursor: pointer; }
        .admin-box { background: #e8f5e9; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #c8e6c9; }
        .result-card { background: #fffde7; padding: 25px; border-radius: 20px; border-left: 10px solid var(--accent); margin-top: 20px; text-align: center; }
        
        /* लॉक स्क्रीन */
        #lock-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,43,36,0.95); z-index: 9999; text-align: center; padding-top: 100px; }
        .lock-box { background: white; max-width: 400px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin-top: 15px; background: #fff; padding: 15px; border-radius: 10px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body onload="checkSystemLock()">

<div id="lock-screen">
    <div class="lock-box">
        <h2 style="color: var(--danger);">🛡️ पोर्टल लॉक है</h2>
        <p>सिस्टम को सक्रिय करने के लिए 'एक्टिवेशन कोड' लिखें:</p>
        <input type="password" id="activeKeyInput" placeholder="यहाँ कोड लिखें...">
        <button onclick="unlockSystem()" style="background: var(--primary); color: white; font-weight: bold;">सिस्टम चालू करें</button>
        <p style="font-size: 11px; color: #777; margin-top: 15px;">G.L.M. College, Banmankhi - Admin Security</p>
    </div>
</div>

<div class="container" id="main-content">
    <div class="header">
        <h1>Gorelal Mehta College, Banmankhi</h1>
        <p><b>Master Digital Portal v23.0</b></p>
    </div>

    <div class="nav">
        <button onclick="showTab('operator')" class="tab-btn active" id="btn-operator">🔍 सर्च/स्कैन</button>
        <button onclick="showTab('history')" class="tab-btn" id="btn-history">📅 वितरण हिस्ट्री</button>
        <button onclick="loginAdmin()" class="tab-btn" id="btn-admin">🔐 एडमिन कंट्रोल</button>
    </div>

    <div id="operator" class="section" style="display:block;">
        <div style="display: flex; gap: 10px;">
            <select id="searchPart" style="flex: 1;"><option value="Part-1">Part-1</option><option value="Part-2">Part-2</option><option value="Part-3">Part-3</option></select>
            <select id="searchDocType" style="flex: 1;"><option value="Marksheet">मार्कशीट</option><option value="Provisional">प्रोविजनल</option></select>
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="searchKey" placeholder="Roll या RegNo यहाँ डालें...">
            <button onclick="startScanner()" class="btn-scan" style="width: auto; padding: 0 20px;">📷 स्कैन</button>
        </div>
        <button onclick="searchStudent()" class="btn-search">डेटा खोजें 🔍</button>
        
        <div id="cam-container" style="display:none; background:#000; padding:15px; border-radius:15px; margin-top:10px; text-align:center;">
            <video id="video" autoplay playsinline style="width:100%; max-width:450px; border-radius:10px;"></video>
            <div style="margin-top:10px;">
                <button id="captureBtn" class="btn-issue" style="display:none; width:auto;" onclick="capturePhoto()">फोटो लें ✅</button>
                <button onclick="stopCamera()" style="background:#666; color:white; width:auto;">कैमरा बंद करें</button>
            </div>
        </div>

        <div id="searchResult" style="display:none;">
            <div class="result-card">
                <div id="photoArea"></div>
                <div id="studentDetails"></div>
                <button id="photoModeBtn" class="btn-issue" onclick="startPhotoMode()">फोटो लेकर जारी करें 📸</button>
            </div>
        </div>
    </div>

    <div id="admin" class="section">
        <div class="stats-badge" id="totalCount">कुल डेटा: लोड हो रहा है...</div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="downloadExcel()" style="background:var(--success); color:white; border:none;">📥 एक्सेल डाउनलोड</button>
            <button onclick="showGallery()" style="background:var(--blue); color:white; border:none;">🖼️ फोटो गैलरी</button>
        </div>

        <div id="galleryArea" class="gallery-grid" style="display:none; background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:20px;"></div>

        <div class="admin-box">
            <h3>📤 एक्सेल अपलोड (Bulk)</h3>
            <select id="uploadDocType" style="border: 2px solid var(--primary);"><option value="Marksheet">Marksheet (मार्कशीट)</option><option value="Provisional">Provisional (प्रोविजनल)</option></select>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <div><label>P1:</label><input type="file" id="up1"><button onclick="handleExcel('Part-1', 'up1')" class="btn-search">Upload P1</button></div>
                <div><label>P2:</label><input type="file" id="up2"><button onclick="handleExcel('Part-2', 'up2')" class="btn-search">Upload P2</button></div>
                <div><label>P3:</label><input type="file" id="up3"><button onclick="handleExcel('Part-3', 'up3')" class="btn-search">Upload P3</button></div>
            </div>
            <p style="font-size:11px; margin-top:5px;">कॉलम: Name, Roll, RegNo, Session, CertNo, Almirah, Shelf</p>
        </div>

        <div style="display: flex; gap: 10px;">
            <button onclick="backupSystem()" class="btn-search">💾 फुल बैकअप</button>
            <button onclick="document.getElementById('resFile').click()" style="background:var(--purple); color:white; border:none;">🔄 रिस्टोर</button>
            <input type="file" id="resFile" style="display:none;" onchange="restoreSystem(event)">
        </div>
        <button onclick="lockSystemManually()" style="background:var(--danger); color:white; border:none; margin-top:20px;">🚨 सिस्टम अभी लॉक करें</button>
        <button onclick="location.reload()" style="background:#444; color:white; border:none; margin-top:10px;">लॉगआउट</button>
    </div>

    <div id="history" class="section">
        <div id="historyContent"></div>
    </div>
</div>

<script>
    // --- सुरक्षा सेटिंग्स ---
    const SECRET_KEY = "GLM-MASTER"; // यही कोड लिखने पर सिस्टम खुलेगा
    const ADMIN_PIN = "4321";

    function checkSystemLock() {
        const isLocked = localStorage.getItem("glm_locked");
        const lastYear = localStorage.getItem("glm_active_year");
        const currentYear = new Date().getFullYear();

        if (isLocked === "true" || !lastYear || parseInt(lastYear) < currentYear) {
            document.getElementById('lock-screen').style.display = 'block';
        }
    }

    function unlockSystem() {
        const input = document.getElementById('activeKeyInput').value;
        if (input === SECRET_KEY) {
            localStorage.setItem("glm_locked", "false");
            localStorage.setItem("glm_active_year", new Date().getFullYear());
            alert("सिस्टम एक्टिवेट हो गया!");
            document.getElementById('lock-screen').style.display = 'none';
        } else {
            alert("गलत एक्टिवेशन कोड!");
        }
    }

    function lockSystemManually() {
        if(confirm("क्या आप अभी सिस्टम लॉक करना चाहते हैं? अगली बार यह कोड मांगेगा।")) {
            localStorage.setItem("glm_locked", "true");
            location.reload();
        }
    }

    // --- डेटाबेस और फंक्शनलिटी ---
    let db, codeReader, stream;
    const request = indexedDB.open("GLM_Ultimate_DB_v23", 1);
    request.onupgradeneeded = e => { e.target.result.createObjectStore("docs", { keyPath: "id" }); };
    request.onsuccess = e => { db = e.target.result; updateCount(); };

    function showTab(t) {
        document.querySelectorAll('.section').forEach(s => s.style.display='none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t).style.display='block';
        document.getElementById('btn-' + t).classList.add('active');
        if(t === 'history') loadTodayHistory();
        if(t === 'admin') updateCount();
    }

    function loginAdmin() {
        if (prompt("एडमिन पिन डालें:") === ADMIN_PIN) showTab('admin');
        else alert("गलत पिन!");
    }

    function searchStudent() {
        const part = document.getElementById('searchPart').value;
        const type = document.getElementById('searchDocType').value;
        const key = document.getElementById('searchKey').value.trim();
        db.transaction("docs").objectStore("docs").getAll().onsuccess = e => {
            const s = e.target.result.find(i => i.part === part && i.docType === type && (i.roll === key || i.regNo === key));
            if(s) {
                document.getElementById('searchResult').style.display = 'block';
                document.getElementById('photoArea').innerHTML = s.photo ? `<img src="${s.photo}" style="width:130px; border:3px solid var(--primary); border-radius:10px;">` : "";
                document.getElementById('studentDetails').innerHTML = `
                    <h2 style="color:var(--primary); margin:10px 0;">${s.name}</h2>
                    <div class="detail-grid">
                        <span><b>Roll:</b> ${s.roll}</span><span><b>Reg No:</b> ${s.regNo}</span>
                        <span><b>Session:</b> ${s.session}</span><span><b>Cert No:</b> ${s.certNo}</span>
                        <span style="color:var(--danger)"><b>Almirah:</b> ${s.almirah}</span><span style="color:var(--danger)"><b>Shelf:</b> ${s.shelf}</span>
                        <span><b>Status:</b> ${s.status}</span><span><b>Type:</b> ${s.docType}</span>
                    </div>`;
                document.getElementById('photoModeBtn').style.display = s.status === 'Pending' ? 'block' : 'none';
                window.cur = s;
            } else alert("डेटा नहीं मिला!");
        };
    }

    async function startScanner() {
        document.getElementById('cam-container').style.display = 'block';
        codeReader = new ZXing.BrowserMultiFormatReader();
        codeReader.decodeFromVideoDevice(undefined, 'video', (res) => {
            if(res){ document.getElementById('searchKey').value = res.text; stopCamera(); searchStudent(); }
        });
    }

    async function startPhotoMode() {
        document.getElementById('cam-container').style.display = 'block';
        document.getElementById('captureBtn').style.display = 'inline-block';
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('video').srcObject = stream;
    }

    function stopCamera() {
        if(codeReader) codeReader.reset();
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('cam-container').style.display = 'none';
    }

    function capturePhoto() {
        const v = document.getElementById('video');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        window.cur.photo = c.toDataURL('image/jpeg', 0.5);
        window.cur.status = "Issued"; window.cur.issueDateOnly = new Date().toLocaleDateString('hi-IN');
        db.transaction("docs", "readwrite").objectStore("docs").put(window.cur);
        alert("डॉक्युमेंट जारी किया गया!"); stopCamera(); searchStudent();
    }

    function handleExcel(part, id) {
        const file = document.getElementById(id).files[0];
        if(!file) return alert("फाइल चुनें!");
        const type = document.getElementById('uploadDocType').value;
        const reader = new FileReader();
        reader.onload = e => {
            const json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type:'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type:'array'}).SheetNames[0]]);
            const tx = db.transaction("docs", "readwrite");
            json.forEach(row => {
                const roll = String(row.Roll || "");
                tx.objectStore("docs").put({ 
                    id: part+"_"+type+"_"+roll, part, docType: type, name: row.Name || "Unknown", 
                    roll, regNo: String(row.RegNo || ""), session: String(row.Session || ""),
                    certNo: String(row.CertNo || ""), almirah: String(row.Almirah || ""),
                    shelf: String(row.Shelf || ""), status: "Pending", photo: "", issueDateOnly: "" 
                });
            });
            tx.oncomplete = () => { alert("डेटा लोड सफल!"); updateCount(); };
        };
        reader.readAsArrayBuffer(file);
    }

    function updateCount() {
        db.transaction("docs").objectStore("docs").count().onsuccess = e => {
            document.getElementById('totalCount').innerText = "कुल रजिस्टर्ड डेटा: " + e.target.result;
        };
    }

    function downloadExcel() {
        db.transaction("docs").objectStore("docs").getAll().onsuccess = e => {
            const ws = XLSX.utils.json_to_sheet(e.target.result);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, "GLM_Master_Data.xlsx");
        };
    }

    function showGallery() {
        const area = document.getElementById('galleryArea');
        area.style.display = area.style.display === 'none' ? 'grid' : 'none';
        db.transaction("docs").objectStore("docs").getAll().onsuccess = e => {
            const issued = e.target.result.filter(s => s.photo);
            area.innerHTML = issued.map(s => `
                <div style="background:#fff; padding:10px; border-radius:10px; text-align:center; border:1px solid #ddd;">
                    <img src="${s.photo}" style="width:100%; border-radius:5px;">
                    <b style="font-size:11px;">${s.roll}</b>
                </div>
            `).join('') || "कोई फोटो नहीं है।";
        };
    }

    function loadTodayHistory() {
        const today = new Date().toLocaleDateString('hi-IN');
        db.transaction("docs").objectStore("docs").getAll().onsuccess = e => {
            const data = e.target.result.filter(s => s.issueDateOnly === today);
            let h = `<h3>आज का वितरण (${today})</h3><table><tr><th>नाम</th><th>रोल</th><th>प्रकार</th><th>अलमारी</th></tr>`;
            data.forEach(s => h += `<tr><td>${s.name}</td><td>${s.roll}</td><td>${s.docType}</td><td>${s.almirah}</td></tr>`);
            document.getElementById('historyContent').innerHTML = h + "</table>";
        };
    }

    function backupSystem() {
        db.transaction("docs").objectStore("docs").getAll().onsuccess = e => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(e.target.result)], {type:"application/json"}));
            a.download = "GLM_Backup.json"; a.click();
        };
    }
    function restoreSystem(ev) {
        const r = new FileReader(); r.onload = e => {
            const data = JSON.parse(e.target.result); const tx = db.transaction("docs", "readwrite");
            data.forEach(i => tx.objectStore("docs").put(i)); tx.oncomplete = () => { alert("रिस्टोर सफल!"); location.reload(); };
        };
        r.readAsText(ev.target.files[0]);
    }
</script>
</body>
</html>
