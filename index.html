<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marksheets Issued Portal</title>
    <script>
        // existing IndexedDB functionality here

        function addStudent() {
            const name = document.getElementById('name').value;
            const roll = document.getElementById('roll').value;
            const regNo = document.getElementById('regNo').value;
            const session = document.getElementById('session').value;
            const certNo = document.getElementById('certNo').value;
            const almirah = document.getElementById('almirah').value;
            const shelf = document.getElementById('shelf').value;

            // Save to IndexedDB
            const transaction = db.transaction(['students'], 'readwrite');
            const store = transaction.objectStore('students');
            const student = { name, roll, regNo, session, certNo, almirah, shelf };
            store.add(student);

            transaction.oncomplete = function() {
                alert('Student record added successfully!');
            };
            transaction.onerror = function() {
                alert('Error adding student record.');
            };
        }
    </script>
</head>
<body>
    <h1>Marksheets Issued Portal</h1>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#" onclick="document.getElementById('manualEntryTab').style.display='block'">Manual Student Entry</a></li>
    </ul>
    <div id="manualEntryTab" style="display:none;">
        <h2>Add Student Record</h2>
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="roll" placeholder="Roll" required>
        <input type="text" id="regNo" placeholder="RegNo" required>
        <input type="text" id="session" placeholder="Session" required>
        <input type="text" id="certNo" placeholder="CertNo" required>
        <input type="text" id="almirah" placeholder="Almirah" required>
        <input type="text" id="shelf" placeholder="Shelf" required>
        <button onclick="addStudent()">Submit</button>
    </div>
    <!-- Existing functionality remains intact -->
</body>
</html>
